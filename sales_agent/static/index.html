<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Voice Sales Agent — Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0f0f13;
    color: #e8e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border-bottom: 1px solid #2a2a4a;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo { font-size: 24px; }
  .header-title { font-size: 18px; font-weight: 600; color: #c0c0e0; }
  .header-sub { font-size: 13px; color: #6060a0; margin-top: 2px; }

  /* ── Status Bar ── */
  .status-bar {
    background: #1a1a2e;
    border-bottom: 1px solid #2a2a4a;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #404060;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-dot.active { background: #00c853; box-shadow: 0 0 8px #00c853; animation: pulse 1.5s infinite; }
  .status-dot.speaking { background: #2979ff; box-shadow: 0 0 8px #2979ff; animation: pulse 0.8s infinite; }
  .status-dot.listening { background: #ff6d00; box-shadow: 0 0 8px #ff6d00; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .status-text { font-size: 13px; color: #8080b0; }
  .state-badge {
    margin-left: auto;
    background: #2a2a4a;
    border: 1px solid #4040a0;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    color: #8080c0;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── Main Layout ── */
  .main {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 0;
    flex: 1;
    overflow: hidden;
  }

  /* ── Conversation Panel ── */
  .conversation {
    display: flex;
    flex-direction: column;
    border-right: 1px solid #2a2a4a;
  }
  .conv-header {
    padding: 16px 20px;
    border-bottom: 1px solid #2a2a4a;
    font-size: 13px;
    font-weight: 600;
    color: #6060a0;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .conv-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .conv-body::-webkit-scrollbar { width: 4px; }
  .conv-body::-webkit-scrollbar-track { background: transparent; }
  .conv-body::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 2px; }

  /* ── Messages ── */
  .msg {
    display: flex;
    gap: 12px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .msg.agent { flex-direction: row; }
  .msg.prospect { flex-direction: row-reverse; }
  .msg-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .msg.agent .msg-avatar { background: #2a2a5a; }
  .msg.prospect .msg-avatar { background: #2a4a2a; }
  .msg-content { max-width: 75%; }
  .msg-name { font-size: 11px; color: #6060a0; margin-bottom: 4px; font-weight: 600; }
  .msg.prospect .msg-name { text-align: right; color: #406040; }
  .msg-bubble {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
  }
  .msg.agent .msg-bubble {
    background: #1e2045;
    border: 1px solid #3040a0;
    color: #c8d8f8;
    border-radius: 4px 12px 12px 12px;
  }
  .msg.prospect .msg-bubble {
    background: #1e3020;
    border: 1px solid #305030;
    color: #c8f8c8;
    border-radius: 12px 4px 12px 12px;
    text-align: right;
  }
  .typing-indicator {
    display: flex; gap: 4px; align-items: center; padding: 4px 0;
  }
  .typing-indicator span {
    width: 6px; height: 6px; border-radius: 50%;
    background: #5060c0;
    animation: typing 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing { 0%,60%,100% { transform: none; opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }

  /* ── Control Panel ── */
  .control-panel {
    border-top: 1px solid #2a2a4a;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: center;
    background: #0f0f18;
  }
  .call-btn {
    width: 80px; height: 80px; border-radius: 50%;
    border: none; cursor: pointer;
    font-size: 30px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    position: relative;
  }
  .call-btn.start {
    background: linear-gradient(135deg, #00c853, #1b5e20);
    box-shadow: 0 4px 20px rgba(0,200,83,0.4);
  }
  .call-btn.end {
    background: linear-gradient(135deg, #f44336, #b71c1c);
    box-shadow: 0 4px 20px rgba(244,67,54,0.4);
    animation: ring 1.5s ease-in-out infinite;
  }
  @keyframes ring { 0%,100% { box-shadow: 0 4px 20px rgba(244,67,54,0.4); } 50% { box-shadow: 0 4px 40px rgba(244,67,54,0.8); } }
  .call-btn:hover { transform: scale(1.08); }
  .call-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .call-btn-label { font-size: 13px; color: #6060a0; font-weight: 500; }

  /* ── Audio Visualizer ── */
  .visualizer {
    height: 40px;
    display: flex;
    align-items: center;
    gap: 3px;
    opacity: 0.3;
    transition: opacity 0.3s;
  }
  .visualizer.active { opacity: 1; }
  .viz-bar {
    width: 3px; background: #4060e0;
    border-radius: 2px;
    transition: height 0.1s;
    min-height: 3px;
  }

  /* ── Right Panel ── */
  .right-panel {
    display: flex;
    flex-direction: column;
    background: #0c0c14;
  }

  /* ── Call Facts ── */
  .panel-section {
    border-bottom: 1px solid #2a2a4a;
  }
  .panel-section-header {
    padding: 14px 16px;
    font-size: 11px;
    font-weight: 700;
    color: #5050a0;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .facts-list {
    padding: 8px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .fact-row {
    display: flex;
    gap: 8px;
    align-items: baseline;
    animation: fadeIn 0.3s ease;
  }
  .fact-key {
    font-size: 11px;
    color: #5050a0;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    min-width: 80px;
    flex-shrink: 0;
  }
  .fact-val {
    font-size: 13px;
    color: #c0d0e0;
    word-break: break-word;
  }

  /* ── FSM State History ── */
  .state-history {
    padding: 8px 16px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .state-chip {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .state-chip.active { background: #3040c0; color: #c0d0ff; border: 1px solid #5060e0; }
  .state-chip.done { background: #1a1a2e; color: #5060a0; border: 1px solid #2a2a4a; }

  /* ── Metrics ── */
  .metrics-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 8px 16px 16px;
  }
  .metric-box {
    background: #161620;
    border: 1px solid #2a2a4a;
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }
  .metric-val { font-size: 22px; font-weight: 700; color: #8090f0; }
  .metric-label { font-size: 10px; color: #5050a0; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #2a3060;
    border: 1px solid #4050a0;
    color: #c0d0ff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; }
    .right-panel { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🤖</div>
  <div>
    <div class="header-title">AI Voice Sales Agent</div>
    <div class="header-sub">Phase 1 Demo — Browser Mode</div>
  </div>
</header>

<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <div class="status-text" id="statusText">Ready to start call</div>
  <div class="state-badge" id="stateBadge">IDLE</div>
</div>

<div class="main">
  <!-- Conversation -->
  <div class="conversation">
    <div class="conv-header">📞 Call Transcript</div>
    <div class="conv-body" id="convBody">
      <div style="text-align:center; color:#404060; padding:40px; font-size:14px;">
        Press Start Call to begin a demo conversation
      </div>
    </div>
    <div class="control-panel">
      <div class="visualizer" id="visualizer">
        <!-- bars added by JS -->
      </div>
      <button class="call-btn start" id="callBtn" onclick="toggleCall()">📞</button>
      <div class="call-btn-label" id="callBtnLabel">Start Call</div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <!-- Facts -->
    <div class="panel-section">
      <div class="panel-section-header">📋 Prospect Facts</div>
      <div class="facts-list" id="factsList">
        <div style="color:#404060; font-size:12px; padding-bottom:8px;">Extracted during call</div>
      </div>
    </div>

    <!-- FSM States -->
    <div class="panel-section">
      <div class="panel-section-header">🗺️ Call Flow</div>
      <div class="state-history" id="stateHistory">
        <div class="state-chip done">IDLE</div>
      </div>
    </div>

    <!-- Metrics -->
    <div class="panel-section">
      <div class="panel-section-header">📊 Live Metrics</div>
      <div class="metrics-grid">
        <div class="metric-box">
          <div class="metric-val" id="metricTurns">0</div>
          <div class="metric-label">Turns</div>
        </div>
        <div class="metric-box">
          <div class="metric-val" id="metricDuration">0s</div>
          <div class="metric-label">Duration</div>
        </div>
        <div class="metric-box">
          <div class="metric-val" id="metricObjections">0</div>
          <div class="metric-label">Objections</div>
        </div>
        <div class="metric-box">
          <div class="metric-val" id="metricOutcome">—</div>
          <div class="metric-label">Outcome</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Audio element for playback -->
<audio id="audioPlayer" autoplay></audio>

<script>
// ── State ───────────────────────────────────────────────────────────────────
let ws = null;
let mediaRecorder = null;
let audioCtx = null;
let analyser = null;
let isCallActive = false;
let callStartTime = null;
let turnCount = 0;
let objectionCount = 0;
let currentState = 'idle';
let stateHistory = [];
let audioQueue = [];
let isPlayingAudio = false;
let durationTimer = null;

// Visualizer bars
const vizContainer = document.getElementById('visualizer');
const VIZ_BARS = 20;
for (let i = 0; i < VIZ_BARS; i++) {
  const bar = document.createElement('div');
  bar.className = 'viz-bar';
  bar.style.height = '3px';
  vizContainer.appendChild(bar);
}

// ── WebSocket ────────────────────────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/call`);

  ws.onopen = () => {
    setStatus('connected', 'Connected — starting call...', 'active');
    ws.send(JSON.stringify({ type: 'start_call' }));
  };

  ws.onclose = () => {
    if (isCallActive) {
      setStatus('idle', 'Connection lost', '');
      endCallUI();
    }
  };

  ws.onerror = () => showToast('Connection error');

  ws.onmessage = (e) => {
    try { handleMessage(JSON.parse(e.data)); }
    catch (err) { console.error('WS parse error', err); }
  };
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'call_started':
      callStartTime = Date.now();
      durationTimer = setInterval(updateDuration, 1000);
      setStatus('speaking', 'Agent is speaking...', 'speaking');
      break;

    case 'vad':
      if (msg.status === 'speaking') {
        setStatus('listening', 'Prospect speaking...', 'listening');
      } else {
        setStatus('active', 'Processing...', 'active');
      }
      break;

    case 'agent_speech':
      addMessage('agent', msg.text);
      turnCount++;
      document.getElementById('metricTurns').textContent = turnCount;
      break;

    case 'prospect_speech':
      addMessage('prospect', msg.text);
      removeTyping();
      break;

    case 'agent_audio':
      queueAudio(msg.data, msg.sample_rate, msg.text);
      break;

    case 'state_change':
      updateState(msg.state, msg.reason);
      if (msg.state === 'objection') {
        objectionCount++;
        document.getElementById('metricObjections').textContent = objectionCount;
      }
      break;

    case 'fact_extracted':
      updateFact(msg.key, msg.value);
      break;

    case 'barge_in':
      // Clear audio queue on barge-in
      audioQueue = [];
      isPlayingAudio = false;
      setStatus('listening', 'Prospect interrupted', 'listening');
      break;

    case 'call_ended':
      handleCallEnded(msg);
      break;

    case 'error':
      showToast(`Error: ${msg.message}`);
      break;
  }
}

// ── Call Control ─────────────────────────────────────────────────────────────
async function toggleCall() {
  if (isCallActive) {
    endCall();
  } else {
    await startCall();
  }
}

async function startCall() {
  // Clear UI
  document.getElementById('convBody').innerHTML = '';
  document.getElementById('factsList').innerHTML = '<div style="color:#404060;font-size:12px;">Extracted during call</div>';
  document.getElementById('stateHistory').innerHTML = '';
  document.getElementById('metricTurns').textContent = '0';
  document.getElementById('metricObjections').textContent = '0';
  document.getElementById('metricOutcome').textContent = '—';
  turnCount = 0; objectionCount = 0; stateHistory = [];
  audioQueue = []; isPlayingAudio = false;

  // Request mic
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 16000, channelCount: 1 }, video: false });
  } catch (e) {
    showToast('Microphone access denied');
    return;
  }

  // Setup audio context for visualizer + PCM capture
  audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  const source = audioCtx.createMediaStreamSource(stream);
  source.connect(analyser);

  // Start visualizer
  animateVisualizer();

  // Setup ScriptProcessor for PCM capture
  const processor = audioCtx.createScriptProcessor(4096, 1, 1);
  source.connect(processor);
  processor.connect(audioCtx.destination);
  processor.onaudioprocess = (e) => {
    if (!isCallActive || !ws || ws.readyState !== WebSocket.OPEN) return;
    const pcm = e.inputBuffer.getChannelData(0);
    const bytes = new Uint8Array(pcm.buffer);
    const b64 = btoa(String.fromCharCode(...bytes));
    ws.send(JSON.stringify({ type: 'audio', data: b64 }));
  };

  // Connect WebSocket
  isCallActive = true;
  document.getElementById('callBtn').className = 'call-btn end';
  document.getElementById('callBtn').textContent = '📵';
  document.getElementById('callBtnLabel').textContent = 'End Call';
  connectWS();
}

function endCall() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'end_call' }));
    ws.close();
  }
  endCallUI();
}

function endCallUI() {
  isCallActive = false;
  if (durationTimer) { clearInterval(durationTimer); durationTimer = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  document.getElementById('callBtn').className = 'call-btn start';
  document.getElementById('callBtn').textContent = '📞';
  document.getElementById('callBtnLabel').textContent = 'Start Call';
  document.getElementById('visualizer').classList.remove('active');
  setStatus('idle', 'Call ended', '');
}

// ── Audio Playback ────────────────────────────────────────────────────────────
function queueAudio(b64data, sampleRate, text) {
  audioQueue.push({ b64data, sampleRate, text });
  if (!isPlayingAudio) playNextAudio();
}

async function playNextAudio() {
  if (audioQueue.length === 0) { isPlayingAudio = false; return; }
  isPlayingAudio = true;
  const { b64data, sampleRate } = audioQueue.shift();

  try {
    const binary = atob(b64data);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const audioBuffer = await ctx.decodeAudioData(bytes.buffer);
    const source = ctx.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(ctx.destination);
    source.start();
    source.onended = () => { ctx.close(); playNextAudio(); };
    setStatus('speaking', 'Agent speaking...', 'speaking');
  } catch (e) {
    console.error('Audio playback error', e);
    playNextAudio();
  }
}

// ── UI Helpers ────────────────────────────────────────────────────────────────
function addMessage(speaker, text) {
  const convBody = document.getElementById('convBody');
  const msg = document.createElement('div');
  msg.className = `msg ${speaker}`;
  const isAgent = speaker === 'agent';
  msg.innerHTML = `
    <div class="msg-avatar">${isAgent ? '🤖' : '👤'}</div>
    <div class="msg-content">
      <div class="msg-name">${isAgent ? 'Agent (Sarah)' : 'Prospect'}</div>
      <div class="msg-bubble">${escapeHtml(text)}</div>
    </div>`;
  convBody.appendChild(msg);
  convBody.scrollTop = convBody.scrollHeight;
}

function removeTyping() {
  const typing = document.getElementById('typingMsg');
  if (typing) typing.remove();
}

function updateState(state, reason) {
  currentState = state;
  document.getElementById('stateBadge').textContent = state.toUpperCase().replace('_', ' ');

  // Add to state history
  stateHistory.push(state);
  const histContainer = document.getElementById('stateHistory');
  histContainer.innerHTML = '';
  stateHistory.forEach((s, i) => {
    const chip = document.createElement('div');
    chip.className = `state-chip ${i === stateHistory.length - 1 ? 'active' : 'done'}`;
    chip.textContent = s.replace('_', ' ');
    histContainer.appendChild(chip);
  });
}

function updateFact(key, value) {
  const factsList = document.getElementById('factsList');
  const existing = document.getElementById(`fact-${key}`);
  if (existing) {
    existing.querySelector('.fact-val').textContent = value;
    return;
  }
  const row = document.createElement('div');
  row.className = 'fact-row';
  row.id = `fact-${key}`;
  row.innerHTML = `
    <div class="fact-key">${key.replace('_', ' ')}</div>
    <div class="fact-val">${escapeHtml(value)}</div>`;
  factsList.appendChild(row);
}

function handleCallEnded(msg) {
  const outcomeEmoji = {
    converted: '✅',
    rejected: '❌',
    voicemail: '📬',
    callback_scheduled: '📅',
    incomplete: '⚠️',
  };
  const emoji = outcomeEmoji[msg.outcome] || '—';
  document.getElementById('metricOutcome').textContent = emoji;
  updateState('ended', 'call_ended');
  showToast(`Call ended — ${msg.outcome} (${msg.duration_seconds}s)`);
  endCallUI();
}

function updateDuration() {
  if (!callStartTime) return;
  const secs = Math.floor((Date.now() - callStartTime) / 1000);
  document.getElementById('metricDuration').textContent = `${secs}s`;
}

function setStatus(type, text, dotClass) {
  document.getElementById('statusText').textContent = text;
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot' + (dotClass ? ` ${dotClass}` : '');
}

function animateVisualizer() {
  const bars = vizContainer.querySelectorAll('.viz-bar');
  vizContainer.classList.add('active');
  function frame() {
    if (!isCallActive) { vizContainer.classList.remove('active'); return; }
    if (analyser) {
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      bars.forEach((bar, i) => {
        const val = data[Math.floor(i * data.length / bars.length)];
        bar.style.height = Math.max(3, val / 4) + 'px';
      });
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>

</body>
</html>
